  <rect x="1073" y="585" width="18" height="18" rx="3" fill="rgba(5, 10, 18, .68)" opacity="0.42"/>
  <rect x="1078" y="590" width="8" height="8" rx="1" fill="#ff3b8d" opacity="1"/>

        
