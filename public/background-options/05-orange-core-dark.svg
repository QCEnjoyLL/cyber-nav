        <circle cx="470" cy="240" r="4" fill="#00f5ff" opacity="0.84"/>
      </g>
      <g opacity="0.22">
        <path d="M128 126 l66 66 M1472 126 l-66 66 M128 874 l66 -66 M1472 874 l-66 -66" stroke="#fcee0a" stroke-width="2" fill="none"/>
        <rect x="620" y="462" width="360" height="92" fill="none" stroke="#ff9f1c" stroke-width="1"/>
