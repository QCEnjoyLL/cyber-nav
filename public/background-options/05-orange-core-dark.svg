        <path d="M128 126 H1472 V874 H128 Z" fill="none" stroke="#00f5ff" stroke-width="1.1"/>
        <path d="M128 126 H1472 V874 H128 Z" fill="none" stroke="#ff9f1c" stroke-width="10" stroke-dasharray="260 120 44 180" opacity="0.32"/>
      </g>
      <g filter="url(#orange-core-dark-soft-glow)">
        <path d="M190 794 H470 L536 732 H730 L798 664 H1010 L1082 594 H1416" fill="none" stroke="#ff9f1c" stroke-width="3.1" stroke-linecap="square" stroke-linejoin="miter" opacity="0.72" />
